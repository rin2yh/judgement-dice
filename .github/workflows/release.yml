name: Release macOS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      plist_version: ${{ steps.version.outputs.plist_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Determine version
        id: version
        run: |
          BASE="v$(TZ=Asia/Tokyo date +%Y.%m.%d)"
          TAG="${BASE}"
          N=2
          while git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; do
            TAG="${BASE}.${N}"
            N=$((N+1))
          done
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "plist_version=${TAG#v}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: arm64
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/JudgementDice .
          file dist/JudgementDice

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bin-arm64
          path: dist/JudgementDice
          if-no-files-found: error
          retention-days: 1

  release:
    needs: [prepare, build]
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Create .app bundle
        run: |
          chmod +x dist/JudgementDice
          APP="dist/JudgementDice.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          mv dist/JudgementDice "$APP/Contents/MacOS/JudgementDice"
          chmod +x "$APP/Contents/MacOS/JudgementDice"
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>JudgementDice</string>
            <key>CFBundleDisplayName</key><string>ジャッジメントダイス</string>
            <key>CFBundleIdentifier</key><string>com.github.rin2yh.judgement-dice</string>
            <key>CFBundleVersion</key><string>${{ needs.prepare.outputs.plist_version }}</string>
            <key>CFBundleShortVersionString</key><string>${{ needs.prepare.outputs.plist_version }}</string>
            <key>CFBundleExecutable</key><string>JudgementDice</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
          codesign --force --deep --sign - "$APP"

      - name: Package zip
        id: package
        run: |
          cd dist
          ZIP="JudgementDice-${{ needs.prepare.outputs.tag }}-macos-arm64.zip"
          ditto -c -k --sequesterRsrc --keepParent JudgementDice.app "$ZIP"
          shasum -a 256 "$ZIP" > "${ZIP}.sha256"
          echo "zip=dist/${ZIP}" >> "$GITHUB_OUTPUT"
          echo "sha=dist/${ZIP}.sha256" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.zip }}
            ${{ steps.package.outputs.sha }}
